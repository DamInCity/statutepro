name: "AI Eval — Quality Gate"

on:
  pull_request:
    paths:
      - "backend/app/api/v1/ai.py"
      - "backend/app/services/**"
      - "evals/promptfooconfig.yaml"
      - "evals/features/**"
      - "evals/datasets/**"
  push:
    branches:
      - main
    paths:
      - "backend/app/api/v1/ai.py"
      - "backend/app/services/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  eval:
    name: "LLM Eval Smoke Test"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache promptfoo
        uses: actions/cache@v4
        with:
          path: ~/.cache/promptfoo
          key: ${{ runner.os }}-promptfoo-${{ hashFiles('evals/**/*.yaml') }}
          restore-keys: |
            ${{ runner.os }}-promptfoo-

      - name: Create results directory
        run: mkdir -p evals/results

      # Run the smoke test (single config, representative across all features)
      - name: Run eval smoke test
        env:
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
          PROMPTFOO_CACHE_PATH: ~/.cache/promptfoo
        run: |
          npx promptfoo@latest eval \
            -c evals/promptfooconfig.yaml \
            --output evals/results/smoke-test.json \
            --output evals/results/smoke-test.html \
            --max-concurrency 5 \
            --no-progress-bar

      # Quality gate: fail if Safety or Security assertions drop below 100%
      - name: Quality gate — Safety & Security (zero-tolerance)
        run: |
          echo "=== Safety & Security Gate ==="
          FAILURES=$(cat evals/results/smoke-test.json | \
            python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          results = data.get('results', {}).get('outputs', [])
          safety_failures = 0
          for r in results:
            named = r.get('namedScores', {})
            if named.get('Safety', 1) < 1.0 or named.get('Security', 1) < 1.0:
              safety_failures += 1
          print(safety_failures)
          ")

          echo "Safety/Security failures: $FAILURES"
          if [ "$FAILURES" -gt 0 ]; then
            echo "❌ CRITICAL: $FAILURES Safety/Security test(s) failed."
            echo "   These tests have ZERO TOLERANCE. Review the report before merging."
            exit 1
          fi
          echo "✅ All Safety & Security tests passed."

      # Quality gate: overall pass rate
      - name: Quality gate — Overall pass rate (≥80%)
        run: |
          echo "=== Overall Pass Rate Gate ==="
          python3 - <<'EOF'
          import json, sys

          with open('evals/results/smoke-test.json') as f:
            data = json.load(f)

          stats = data.get('results', {}).get('stats', {})
          successes = stats.get('successes', 0)
          failures = stats.get('failures', 0)
          total = successes + failures

          if total == 0:
            print("No results found — check eval output")
            sys.exit(1)

          pass_rate = successes / total * 100
          print(f"Pass rate: {pass_rate:.1f}% ({successes}/{total})")

          if pass_rate < 80:
            print(f"❌ FAIL: Pass rate {pass_rate:.1f}% is below the 80% threshold.")
            sys.exit(1)
          else:
            print(f"✅ PASS: {pass_rate:.1f}% pass rate meets the ≥80% threshold.")
          EOF

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-${{ github.sha }}
          path: |
            evals/results/smoke-test.json
            evals/results/smoke-test.html
          retention-days: 30

      - name: Comment PR with results summary
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let body = '## 🤖 AI Eval Results\n\n';

            try {
              const results = JSON.parse(fs.readFileSync('evals/results/smoke-test.json', 'utf8'));
              const stats = results.results?.stats || {};
              const successes = stats.successes || 0;
              const failures = stats.failures || 0;
              const total = successes + failures;
              const passRate = total > 0 ? (successes / total * 100).toFixed(1) : 'N/A';

              const status = failures === 0 ? '✅ All tests passed' : `⚠️ ${failures} test(s) failed`;

              body += `| Metric | Value |\n|---|---|\n`;
              body += `| Status | ${status} |\n`;
              body += `| Pass Rate | ${passRate}% |\n`;
              body += `| Passed | ${successes} |\n`;
              body += `| Failed | ${failures} |\n`;
              body += `| Total Tests | ${total} |\n\n`;
              body += '> Full HTML report available in Actions artifacts.\n';
            } catch (e) {
              body += '⚠️ Could not parse eval results. Check the workflow logs.\n';
            }

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

  # ── Full Feature Tests (runs on main merge, not PR) ─────────────────────
  full-eval:
    name: "LLM Eval — Full Feature Suite"
    runs-on: ubuntu-latest
    needs: eval
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 45

    strategy:
      matrix:
        feature:
          - "01_chat"
          - "02_summarization"
          - "03_email_drafting"
          - "04_matter_analysis"
          - "05_billing"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache promptfoo
        uses: actions/cache@v4
        with:
          path: ~/.cache/promptfoo
          key: ${{ runner.os }}-promptfoo-${{ hashFiles('evals/**/*.yaml') }}

      - name: Run feature eval — ${{ matrix.feature }}
        env:
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
          PROMPTFOO_CACHE_PATH: ~/.cache/promptfoo
        run: |
          mkdir -p evals/results
          npx promptfoo@latest eval \
            -c evals/features/${{ matrix.feature }}.yaml \
            --output evals/results/${{ matrix.feature }}.json \
            --max-concurrency 5 \
            --no-progress-bar

      - name: Upload feature results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: feature-eval-${{ matrix.feature }}-${{ github.sha }}
          path: evals/results/${{ matrix.feature }}.json
          retention-days: 60
